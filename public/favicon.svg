<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1493"/>
      <stop offset="100%" stop-color="#ff69b4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f0b12"/>
  <!-- Onyx gem shape -->
  <polygon points="32,8 52,24 44,56 20,56 12,24" fill="url(#g)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner facet highlight -->
  <polygon points="32,14 46,26 32,38 18,26" fill="#fff" opacity="0.15"/>
  <!-- Center line -->
  <line x1="32" y1="14" x2="32" y2="56" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
  <!-- Bottom facet lines -->
  <line x1="20" y1="56" x2="32" y2="38" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
  <line x1="44" y1="56" x2="32" y2="38" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
</svg>
